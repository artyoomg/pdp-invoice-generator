services:
  db:
    image: postgres:latest
    restart: always
    environment:
      - POSTGRES_DB=gaspntrader
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=example
      - POSTGRES_PORT=5432
      - PGDATA=/var/lib/postgresql/data
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
  be:
    build: .
    ports: 
      - "443:3000"
    depends_on:
      - db
    volumes:
      - /home/runner/certs:/home/runner/certs:ro

volumes:
  postgres-data: